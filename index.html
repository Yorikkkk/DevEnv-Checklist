<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevEnv Checklist</title>
    <meta name="description" content="Чекліст налаштування середовища розробки для інженерів">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="container header-content">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                <h1>DevEnv Checklist</h1>
            </div>
            <div class="header-controls">
                <button id="theme-toggle" class="btn btn-icon" aria-label="Перемкнути тему" title="Перемкнути тему">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <button id="reset-btn" class="btn btn-danger">Скинути прогрес</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Stack Selection -->
        <section class="stack-selector glass-panel">
            <h2>Оберіть стек розробки</h2>
            <div class="stack-cards" id="stack-container">
                <!-- Stack cards injected here -->
            </div>
        </section>

        <!-- Progress Overview -->
        <section class="progress-section">
            <div class="progress-header">
                <h3>Прогрес налаштування: <span id="stack-name-display">Frontend Stack</span></h3>
                <div class="progress-stats">
                    <span id="completed-count">0</span> / <span id="total-count">0</span> виконано
                </div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar" style="width: 0%"></div>
            </div>
        </section>

        <div class="main-layout">
            <!-- Sidebar: Filters & Add Custom -->
            <aside class="sidebar">
                <div class="glass-panel">
                    <h3>Пошук та Фільтри</h3>
                    
                    <div class="search-box">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="search-input" placeholder="Знайти інструмент...">
                    </div>

                    <div class="filter-group">
                        <h4>Категорії</h4>
                        <div class="filter-options" id="category-filters">
                            <label class="filter-label active">
                                <input type="radio" name="category" value="Всі" checked>
                                Всі
                            </label>
                            <label class="filter-label">
                                <input type="radio" name="category" value="Софт">
                                Софт
                            </label>
                            <label class="filter-label">
                                <input type="radio" name="category" value="CLI Команди">
                                CLI Команди
                            </label>
                            <label class="filter-label">
                                <input type="radio" name="category" value="Розширення">
                                Розширення
                            </label>
                        </div>
                    </div>
                    <div class="found-count-display">
                        Знайдено: <span id="found-count">0</span>
                    </div>
                </div>

                <div class="glass-panel">
                    <h3>Додати власний крок</h3>
                    <form id="add-step-form" class="add-step-form">
                        <div class="form-group">
                            <label for="step-name">Назва інструменту / кроку</label>
                            <input type="text" id="step-name" placeholder="Наприклад: Postman" required minlength="3">
                        </div>
                        <div class="form-group">
                            <label for="step-desc">Короткий опис</label>
                            <input type="text" id="step-desc" placeholder="Тестування API" required>
                        </div>
                        <div class="form-group">
                            <label for="step-cat">Категорія</label>
                            <select id="step-cat">
                                <option value="Софт">Софт</option>
                                <option value="CLI Команди">CLI Команди</option>
                                <option value="Розширення">Розширення</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Додати крок</button>
                    </form>
                </div>
            </aside>

            <!-- Checklist Area -->
            <div class="checklist-area">
                <div id="checklist-container" class="checklist-container">
                    <!-- Tool cards injected here -->
                </div>
                
                <div id="empty-state" class="empty-state hidden">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <h3>Нічого не знайдено</h3>
                    <p>Спробуйте змінити пошуковий запит або категорію.</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
